name: flashcard-ai-mcp
description: AI-powered flashcard ai MCP server for agents. Supports generate flashcards,
  quiz me, spaced repetition. By MEOK AI Labs.
version: 1.0.0
tools:
- name: generate_flashcards
  description: MEOK AI Labs tool.
  parameters:
  - name: text
    type: string
    required: true
  - name: count
    type: integer
    required: false
- name: quiz_me
  description: MEOK AI Labs tool.
  parameters:
  - name: topic
    type: string
    required: true
  - name: difficulty
    type: string
    required: false
- name: spaced_repetition
  description: MEOK AI Labs tool.
  parameters:
  - name: cards
    type: string
    required: true
  - name: performance
    type: string
    required: false
- name: export_anki
  description: MEOK AI Labs tool.
  parameters:
  - name: flashcards
    type: string
    required: true
